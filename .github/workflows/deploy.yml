name: Trigger Coolify deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify Coolify
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          APP_UUID: gatb4yqli6zh6aoabkkg8ac2
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            "https://app.coolify.io/api/v1/deploy?uuid=${APP_UUID}"
          echo
          echo "Coolify will redeploy (app mereka-lms-static-prototype, uuid ${APP_UUID})."
